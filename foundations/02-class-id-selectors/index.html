<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class and ID Selectors</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <p class="same-color">Number 1 - I'm a class!</p><!--a light red/pink background, and a list of fonts containing `Verdana` and `DejaVu Sans` with `sans-serif` as a fallback-->

    <div id="iAmBlue">Number 2 - I'm one ID.</div><!--blue text and a font size of 36px-->

    <p class="same-color iAmCooler">Number 3 - I'm a class, but cooler!</p><!--a light red/pink background, and a list of fonts containing `Verdana` and `DejaVu Sans` with `sans-serif` as a fallback--><!--in addition to the styles for all odd numbered elements, add a font size of 24px-->

    <div id="iAmGreen">Number 4 - I'm another ID.</div><!--a light green background, a font size of 24px, and bold-->

    <p class="same-color">Number 5 - I'm a class!</p><!--a light red/pink background, and a list of fonts containing `Verdana` and `DejaVu Sans` with `sans-serif` as a fallback-->
  </body>
</html>
